<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>PolyHedge — Sector</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            :root {
                --bg: #07070d;
                --bg2: #0d0d18;
                --bg3: #111120;
                --cream: #ede8d9;
                --cream-dim: #8c8676;
                --gold: #c6a15b;
                --gold-bright: #e2bc72;
                --gold-dim: #7a6238;
                --yes: #34d399;
                --no: #f87171;
                --border: rgba(255, 255, 255, 0.06);
                --border-warm: rgba(198, 161, 91, 0.28);
            }
            body {
                background: var(--bg);
                color: var(--cream);
                font-family: "DM Sans", sans-serif;
                min-height: 100vh;
            }

            nav {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 200;
                padding: 0 2.5rem;
                height: 60px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                border-bottom: 0.5px solid var(--border-warm);
                backdrop-filter: blur(20px);
                background: rgba(7, 7, 13, 0.9);
            }
            .nav-logo {
                font-family: "Cormorant Garant", serif;
                font-size: 1.3rem;
                font-weight: 600;
                color: var(--cream);
                display: flex;
                align-items: center;
                gap: 10px;
                text-decoration: none;
            }
            .nav-dot {
                width: 7px;
                height: 7px;
                border-radius: 50%;
                background: var(--gold);
                animation: blink 2.5s ease-in-out infinite;
            }
            @keyframes blink {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.4;
                }
            }
            .back {
                font-family: "JetBrains Mono", monospace;
                font-size: 0.68rem;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                color: var(--cream-dim);
                text-decoration: none;
                display: flex;
                align-items: center;
                gap: 6px;
                transition: color 0.2s;
            }
            .back:hover {
                color: var(--gold);
            }

            .header {
                padding: 5rem 2.5rem 2rem;
                background: var(--bg2);
                border-bottom: 0.5px solid var(--border-warm);
                position: relative;
                overflow: hidden;
            }
            .header::before {
                content: "";
                position: absolute;
                top: -50%;
                right: -5%;
                width: 50%;
                height: 200%;
                background: radial-gradient(
                    ellipse,
                    rgba(198, 161, 91, 0.07) 0%,
                    transparent 65%
                );
                pointer-events: none;
            }
            .eyebrow {
                font-family: "JetBrains Mono", monospace;
                font-size: 0.62rem;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: var(--gold);
                margin-bottom: 0.75rem;
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .eyebrow::before {
                content: "";
                width: 24px;
                height: 0.5px;
                background: var(--gold);
            }
            h1 {
                font-family: "Cormorant Garant", serif;
                font-size: clamp(2.2rem, 4vw, 3.8rem);
                font-weight: 300;
                line-height: 1.1;
                margin-bottom: 1.25rem;
            }
            h1 em {
                font-style: italic;
                color: var(--gold);
            }
            .status-row {
                display: flex;
                align-items: center;
                gap: 1rem;
                flex-wrap: wrap;
            }
            .badge {
                font-family: "JetBrains Mono", monospace;
                font-size: 0.65rem;
                letter-spacing: 0.08em;
                padding: 5px 14px;
                border: 0.5px solid var(--border-warm);
                color: var(--cream-dim);
                display: flex;
                align-items: center;
                gap: 7px;
            }
            .live-dot {
                width: 5px;
                height: 5px;
                border-radius: 50%;
                background: var(--yes);
                animation: blink 1.5s ease-in-out infinite;
            }
            #api-badge {
                font-family: "JetBrains Mono", monospace;
                font-size: 0.65rem;
                padding: 5px 14px;
                border: 0.5px solid;
                color: var(--gold-dim);
                border-color: var(--gold-dim);
            }
            #api-badge.ok {
                color: var(--yes);
                border-color: rgba(52, 211, 153, 0.35);
            }
            #api-badge.err {
                color: var(--no);
                border-color: rgba(248, 113, 113, 0.35);
            }

            /* SECTOR TABS */
            .tabs {
                background: var(--bg2);
                border-bottom: 0.5px solid var(--border-warm);
                padding: 0 2.5rem;
                display: flex;
                gap: 0;
                overflow-x: auto;
            }
            .tab {
                font-family: "JetBrains Mono", monospace;
                font-size: 0.63rem;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                padding: 0.9rem 1.25rem;
                color: var(--cream-dim);
                cursor: pointer;
                border-bottom: 2px solid transparent;
                transition: all 0.2s;
                white-space: nowrap;
                background: none;
                border-top: none;
                border-left: none;
                border-right: none;
            }
            .tab:hover {
                color: var(--gold);
            }
            .tab.active {
                color: var(--gold);
                border-bottom-color: var(--gold);
            }

            /* RAW JSON PANEL */
            .raw-panel {
                margin: 0 2.5rem;
                margin-top: 1.5rem;
                background: var(--bg3);
                border: 0.5px solid var(--border-warm);
                border-radius: 4px;
                overflow: hidden;
            }
            .raw-header {
                padding: 0.6rem 1rem;
                border-bottom: 0.5px solid var(--border);
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .raw-label {
                font-family: "JetBrains Mono", monospace;
                font-size: 0.58rem;
                letter-spacing: 0.15em;
                text-transform: uppercase;
                color: var(--gold-dim);
            }
            .raw-url {
                font-family: "JetBrains Mono", monospace;
                font-size: 0.6rem;
                color: var(--cream-dim);
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                max-width: 70%;
            }
            .raw-body {
                padding: 1rem;
                font-family: "JetBrains Mono", monospace;
                font-size: 0.65rem;
                color: #7ec8a0;
                line-height: 1.6;
                max-height: 160px;
                overflow-y: auto;
                white-space: pre-wrap;
                word-break: break-all;
            }

            /* MARKETS GRID */
            .grid-wrap {
                padding: 1.5rem 2.5rem 4rem;
            }
            .grid-meta {
                font-family: "JetBrains Mono", monospace;
                font-size: 0.65rem;
                color: var(--cream-dim);
                margin-bottom: 1.25rem;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                gap: 1px;
                background: var(--border-warm);
            }
            .loading {
                grid-column: 1/-1;
                padding: 3rem;
                text-align: center;
                background: var(--bg);
                font-family: "JetBrains Mono", monospace;
                font-size: 0.75rem;
                color: var(--cream-dim);
                letter-spacing: 0.1em;
            }
            .spinner {
                display: inline-block;
                width: 12px;
                height: 12px;
                border: 1.5px solid var(--border-warm);
                border-top-color: var(--gold);
                border-radius: 50%;
                animation: spin 0.7s linear infinite;
                margin-right: 8px;
                vertical-align: middle;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            /* MARKET CARD */
            .card {
                background: var(--bg);
                padding: 1.5rem;
                position: relative;
                overflow: hidden;
                transition: background 0.2s;
            }
            .card:hover {
                background: var(--bg2);
            }
            .card::before {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 2px;
                background: linear-gradient(
                    90deg,
                    var(--gold-dim),
                    transparent
                );
                opacity: 0;
                transition: opacity 0.3s;
            }
            .card:hover::before {
                opacity: 1;
            }
            .card-cat {
                font-family: "JetBrains Mono", monospace;
                font-size: 0.58rem;
                letter-spacing: 0.14em;
                text-transform: uppercase;
                color: var(--gold-dim);
                margin-bottom: 0.6rem;
            }
            .card-q {
                font-family: "Cormorant Garant", serif;
                font-size: 1.05rem;
                font-weight: 400;
                line-height: 1.35;
                color: var(--cream);
                margin-bottom: 1rem;
                min-height: 2.5rem;
            }
            .prob-bar-wrap {
                height: 3px;
                background: rgba(255, 255, 255, 0.05);
                margin-bottom: 0.75rem;
                overflow: hidden;
            }
            .prob-bar {
                height: 100%;
                background: linear-gradient(
                    90deg,
                    var(--gold-dim),
                    var(--gold)
                );
                transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .card-stats {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 1rem;
            }
            .prob-num {
                font-family: "JetBrains Mono", monospace;
                font-size: 1.1rem;
                font-weight: 500;
                color: var(--gold);
            }
            .vol {
                font-family: "JetBrains Mono", monospace;
                font-size: 0.65rem;
                color: var(--cream-dim);
            }
            .card-footer {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding-top: 0.75rem;
                border-top: 0.5px solid var(--border);
            }
            .card-id {
                font-family: "JetBrains Mono", monospace;
                font-size: 0.55rem;
                color: var(--cream-dim);
                opacity: 0.5;
                letter-spacing: 0.04em;
            }
            .card-end {
                font-family: "JetBrains Mono", monospace;
                font-size: 0.58rem;
                color: var(--cream-dim);
            }
            .yes-no {
                display: flex;
                gap: 0.4rem;
            }
            .yn-btn {
                font-family: "JetBrains Mono", monospace;
                font-size: 0.6rem;
                letter-spacing: 0.06em;
                padding: 4px 10px;
                border: 0.5px solid;
                background: none;
                cursor: pointer;
                transition: all 0.18s;
            }
            .yn-yes {
                border-color: rgba(52, 211, 153, 0.25);
                color: var(--yes);
            }
            .yn-yes:hover {
                background: rgba(52, 211, 153, 0.1);
                border-color: rgba(52, 211, 153, 0.5);
            }
            .yn-no {
                border-color: rgba(248, 113, 113, 0.25);
                color: var(--no);
            }
            .yn-no:hover {
                background: rgba(248, 113, 113, 0.1);
                border-color: rgba(248, 113, 113, 0.5);
            }

            .error-box {
                margin: 1.5rem 2.5rem;
                padding: 1.25rem 1.5rem;
                border: 0.5px solid rgba(248, 113, 113, 0.3);
                background: rgba(248, 113, 113, 0.04);
                font-family: "JetBrains Mono", monospace;
                font-size: 0.72rem;
                color: var(--no);
                line-height: 1.7;
                display: none;
            }
            .error-box.visible {
                display: block;
            }
        </style>
    </head>
    <body>
        <nav>
            <a class="nav-logo" href="PolymarketLandingPage.html">
                <div class="nav-dot"></div>
                Poly Hedge
            </a>
            <a class="back" href="PolymarketLandingPage.html"
                >← Back to Markets</a
            >
        </nav>

        <div class="header">
            <div class="eyebrow">Live Data · Polymarket API</div>
            <h1>Sector: <em id="sector-title">Loading…</em></h1>
            <div class="status-row">
                <div class="badge">
                    <span class="live-dot"></span>Live · Polymarket Gamma API
                </div>
                <div id="api-badge">⬡ Fetching…</div>
            </div>
        </div>

        <div class="tabs" id="tabs"></div>

        <!-- RAW API RESPONSE PANEL — proves the call works -->
        <div class="raw-panel">
            <div class="raw-header">
                <span class="raw-label">⬡ Raw API Response</span>
                <span class="raw-url" id="raw-url">—</span>
            </div>
            <div class="raw-body" id="raw-body">Waiting for response…</div>
        </div>

        <div class="error-box" id="error-box"></div>

        <div class="grid-wrap">
            <div class="grid-meta">
                <span id="grid-count">Loading markets…</span>
                <span
                    id="grid-src"
                    style="color: var(--gold-dim); font-size: 0.6rem"
                ></span>
            </div>
            <div class="grid" id="grid">
                <div class="loading">
                    <span class="spinner"></span>Calling Polymarket API…
                </div>
            </div>
        </div>

        <script>
            const API_BASE = "http://localhost:3001";

            // Sectors config
            const SECTORS = [
                { key: "all", label: "All", keyword: "", icon: "⬡" },
                {
                    key: "politics",
                    label: "Politics",
                    keyword: "election",
                    icon: "🏛️",
                },
                {
                    key: "finance",
                    label: "Finance",
                    keyword: "fed rate",
                    icon: "📈",
                },
                {
                    key: "crypto",
                    label: "Crypto",
                    keyword: "bitcoin",
                    icon: "₿",
                },
                { key: "sports", label: "Sports", keyword: "nba", icon: "⚽" },
                { key: "tech", label: "Tech", keyword: "ai", icon: "💻" },
            ];

            // Read sector from URL param e.g. sector.html?sector=crypto
            const params = new URLSearchParams(window.location.search);
            let activeSector = params.get("sector") || "all";

            // Build tabs
            const tabsEl = document.getElementById("tabs");
            SECTORS.forEach((s) => {
                const btn = document.createElement("button");
                btn.className =
                    "tab" + (s.key === activeSector ? " active" : "");
                btn.textContent = s.icon + " " + s.label;
                btn.onclick = () => switchSector(s.key);
                tabsEl.appendChild(btn);
            });

            function switchSector(key) {
                activeSector = key;
                // Update URL without reload
                const url = new URL(window.location);
                url.searchParams.set("sector", key);
                window.history.pushState({}, "", url);
                // Update tabs
                document.querySelectorAll(".tab").forEach((t, i) => {
                    t.className =
                        "tab" + (SECTORS[i].key === key ? " active" : "");
                });
                loadMarkets(key);
            }

            function formatVol(n) {
                n = parseFloat(n) || 0;
                if (n >= 1_000_000)
                    return "$" + (n / 1_000_000).toFixed(1) + "M";
                if (n >= 1_000) return "$" + (n / 1_000).toFixed(0) + "K";
                return "$" + n.toFixed(0);
            }

            function formatDate(d) {
                if (!d) return "—";
                return new Date(d).toLocaleDateString("en-US", {
                    month: "short",
                    day: "numeric",
                    year: "numeric",
                });
            }

            async function loadMarkets(sectorKey) {
                const sector =
                    SECTORS.find((s) => s.key === sectorKey) || SECTORS[0];
                document.getElementById("sector-title").textContent =
                    sector.label;
                document.getElementById("api-badge").textContent =
                    "⬡ Fetching…";
                document.getElementById("api-badge").className = "";
                document.getElementById("raw-body").textContent =
                    "Calling API…";
                document.getElementById("error-box").className = "error-box";
                document.getElementById("grid").innerHTML =
                    '<div class="loading"><span class="spinner"></span>Calling Polymarket API…</div>';

                // Build the URL
                const keyword = sector.keyword;
                const apiUrl = `${API_BASE}/api/markets?limit=12${keyword ? "&keyword=" + encodeURIComponent(keyword) : ""}`;
                document.getElementById("raw-url").textContent = apiUrl;

                try {
                    const res = await fetch(apiUrl);
                    const data = await res.json();

                    // Show raw response (first 800 chars so it's readable)
                    const rawStr = JSON.stringify(data, null, 2);
                    document.getElementById("raw-body").textContent =
                        rawStr.length > 900
                            ? rawStr.slice(0, 900) +
                              "\n\n… (" +
                              (rawStr.length - 900) +
                              " more chars)"
                            : rawStr;

                    if (!data.success || !data.markets?.length) {
                        document.getElementById("api-badge").textContent =
                            "✗ No markets returned";
                        document.getElementById("api-badge").className = "err";
                        document.getElementById("grid").innerHTML =
                            '<div class="loading" style="color:var(--no)">No markets found for this sector.</div>';
                        document.getElementById("grid-count").textContent =
                            "0 markets";
                        return;
                    }

                    // Success
                    document.getElementById("api-badge").textContent =
                        "✓ API call successful · " +
                        data.markets.length +
                        " markets";
                    document.getElementById("api-badge").className = "ok";
                    document.getElementById("grid-count").textContent =
                        data.markets.length + " live markets";
                    document.getElementById("grid-src").textContent =
                        "Source: gamma-api.polymarket.com";

                    const grid = document.getElementById("grid");
                    grid.innerHTML = data.markets
                        .map((m) => {
                            const prices = (() => {
                                try {
                                    return JSON.parse(
                                        m.outcomePrices || "[0.5,0.5]",
                                    );
                                } catch (_) {
                                    return [0.5, 0.5];
                                }
                            })();
                            const yesPct = Math.round(
                                parseFloat(prices[0]) * 100,
                            );
                            const vol = formatVol(m.volume);
                            const end = formatDate(m.endDate);
                            return `
        <div class="card">
          <div class="card-cat">${m.category || sectorKey}</div>
          <div class="card-q">${m.question}</div>
          <div class="prob-bar-wrap">
            <div class="prob-bar" style="width:0%" data-prob="${yesPct}"></div>
          </div>
          <div class="card-stats">
            <span class="prob-num">${yesPct}% YES</span>
            <span class="vol">${vol} vol</span>
          </div>
          <div class="card-footer">
            <span class="card-end">Closes ${end}</span>
            <div class="yes-no">
              <button class="yn-btn yn-yes">YES ▲</button>
              <button class="yn-btn yn-no">NO ▼</button>
            </div>
          </div>
        </div>
      `;
                        })
                        .join("");

                    // Animate bars
                    setTimeout(() => {
                        document.querySelectorAll(".prob-bar").forEach((b) => {
                            b.style.width = b.dataset.prob + "%";
                        });
                    }, 80);
                } catch (err) {
                    document.getElementById("api-badge").textContent =
                        "✗ Server offline";
                    document.getElementById("api-badge").className = "err";
                    document.getElementById("raw-body").textContent =
                        "Error: " + err.message;
                    document.getElementById("error-box").className =
                        "error-box visible";
                    document.getElementById("error-box").innerHTML = `
      ✗ Could not reach backend<br><br>
      Make sure your server is running:<br>
      <strong>cd PolyHedge && node server.js</strong><br><br>
      Then refresh this page.
    `;
                    document.getElementById("grid").innerHTML =
                        '<div class="loading" style="color:var(--no)">⬡ Server offline — run: node server.js</div>';
                }
            }

            // Kick off
            loadMarkets(activeSector);
        </script>
    </body>
</html>
